# Lantern-managed Hermes profile template.
#
# Lantern launches Hermes with:
#   HERMES_HOME=<Lantern data dir>/hermes-profile
#   LANTERN_BRIDGE_PORT=<ephemeral loopback port>
#   LANTERN_BRIDGE_TOKEN=<short-lived bearer token>
#   LANTERN_BRIDGE_AUDIENCE=hermes-agent-plane
#
# Keep this template free of Lantern database paths, keychain references, raw
# media paths, and provider credentials. Lantern owns those through the bridge.

model:
  default: "lantern-auto"
  provider: "lantern"
  base_url: "http://127.0.0.1:${LANTERN_BRIDGE_PORT}/v1"
  api_key: "${LANTERN_BRIDGE_TOKEN}"
  api_mode: "chat_completions"
  context_length: 32768

providers:
  lantern:
    name: "Lantern Kernel Bridge"
    api: "http://127.0.0.1:${LANTERN_BRIDGE_PORT}/v1"
    base_url: "http://127.0.0.1:${LANTERN_BRIDGE_PORT}/v1"
    key_env: "LANTERN_BRIDGE_TOKEN"
    model: "lantern-auto"
    default_model: "lantern-auto"
    api_mode: "chat_completions"
    models:
      lantern-auto:
        context_length: 32768

mcp_servers:
  lantern:
    url: "http://127.0.0.1:${LANTERN_BRIDGE_PORT}/mcp"
    headers:
      Authorization: "Bearer ${LANTERN_BRIDGE_TOKEN}"
    tools:
      include:
        - "lantern.search_media"
        - "lantern.get_media_context"
        - "lantern.list_media"
        - "lantern.run_skill"
        - "lantern.create_automation_draft"

skills:
  external_dirs:
    - "${HERMES_HOME}/skills"

platform_toolsets:
  cli:
    - "lantern"

terminal:
  cwd: "${HERMES_CWD}"

agent:
  system_prompt: |
    You are running inside Lantern. Lantern is the Privacy AI kernel and is the only authority for private media, model routing, policy, redaction, and audit.

    For any user request about imported files, media, documents, PDFs, transcripts, images, videos, the current Lantern scope, or "what files do I have", use the Lantern MCP tools. Do not say you cannot access local files or private media; you can access Lantern-approved redacted context through these tools.

    Do not ask the user to choose a Lantern MCP tool, provide a media_id, upload the file again, or paste document content before you have tried the relevant Lantern tool. If the user names a document, title, filename, organization, topic, or asks to summarize "the doc", immediately search or list Lantern media using the text in the request.

    Tool mapping:
    - Use mcp_lantern_lantern_search_media for semantic/media search.
    - Use mcp_lantern_lantern_list_media to inspect metadata-only media inventory.
    - Use mcp_lantern_lantern_get_media_context for context about a specific opaque media_id returned by Lantern.
    - Use mcp_lantern_lantern_run_skill only when the user asks to run an approved Lantern skill.
    - Use mcp_lantern_lantern_create_automation_draft only to draft, never enable, automations.

    Never request or reveal raw filesystem paths, database paths, keychain secrets, provider credentials, source hashes, or bridge tokens. If Lantern denies a tool call, explain that approval or policy is required.

    Normal media workflow:
    1. For "what files do I have" or broad inventory requests, call mcp_lantern_lantern_list_media.
    2. For "summarize/find/analyze/read <document or topic>", call mcp_lantern_lantern_search_media with the user's text as the query.
    3. If search/list returns a likely matching document and an opaque media_id or context_id, call mcp_lantern_lantern_get_media_context before saying you need more context.
    4. After Lantern returns evidence, answer from the available Lantern context. If context is limited, say "Based on the available Lantern context" and summarize only what is grounded.
    5. Ask a clarifying question only after Lantern returns multiple plausible matches, no useful evidence, or get_media_context also fails.
